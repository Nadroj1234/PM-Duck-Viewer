<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ECTS CMP Ducks!</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC"
      crossorigin="anonymous"
    />
    <style>
      #main_container {
        margin-top: 4em;
      }
      .stat_text {
        width: 120px;
      }
      .progress {
        width: 300px;
      }
    </style>
  </head>
  <body>
    <div class="container" id="main_container">
      <div class="mb-3">
        <label for="duckSelect" class="form-label">Please select a duck</label>
        <select
          id="duckSelect"
          name="duckSelect"
          class="form-select"
          aria-label="Default select example"
          placehoder="Select a duck"
        ></select>
      </div>
      <div class="row">
        <div class="col-md-6"></div>
        <div class="col-md-6">
          <!--name, assembler, adjectives, bio, stats
                    focus:10
health 
1
intelligence
: 
14000
kindness
: 
3000
strength
: 
1000
                    
                    -->
          <div
            id="strength_bar"
            class="d-flex align-items-center gap-2 flex-wrap"
          >
            <div class="stat_text">Strength</div>
            <div class="progress flex-grow-1">
              <div
                class="progress-bar bg-warning"
                role="progressbar"
                style="width: 75%"
              >
                <span class="stat_val_span" id="strength_val_span"></span>
              </div>
            </div>
          </div>
          <div
            id="health_bar"
            class="d-flex align-items-center gap-2 flex-wrap"
          >
            <div class="stat_text">Health</div>
            <div class="progress flex-grow-1">
              <div
                class="progress-bar bg-primary"
                role="progressbar"
                style="width: 75%"
              >
                <span class="stat_val_span" id="health_val_span"></span>
              </div>
            </div>
          </div>
          <div
            id="intelligence_bar"
            class="d-flex align-items-center gap-2 flex-wrap"
          >
            <div class="stat_text">Intelligence</div>
            <div class="progress flex-grow-1">
              <div
                class="progress-bar bg-success"
                role="progressbar"
                style="width: 75%"
              >
                <span class="stat_val_span" id="intelligence_val_span"></span>
              </div>
            </div>
          </div>

          <div id="focus_bar" class="d-flex align-items-center gap-2 flex-wrap">
            <div class="stat_text">Focus</div>
            <div class="progress flex-grow-1">
              <div
                class="progress-bar bg-danger"
                role="progressbar"
                style="width: 75%"
              >
                <span class="stat_val_span" id="focus_val_span"></span>
              </div>
            </div>
          </div>
          <div
            id="kindness_bar"
            class="d-flex align-items-center gap-2 flex-wrap"
          >
            <div class="stat_text">Kindness</div>
            <div class="progress flex-grow-1">
              <div
                class="progress-bar bg-info"
                role="progressbar"
                style="width: 75%"
              >
                <span class="stat_val_span" id="kindness_val_span"></span>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
    <script>
      const STAT_MULTIPLIER = 10;
      const duckSelect = document.getElementById("duckSelect");
      let activeDuck;
      fetch("https://api.ducks.ects-cmp.com/ducks")
        .then((resp) => resp.json())
        .then((data) => {
          for (d of data) {
            const option = document.createElement("option");
            option.innerHTML = `
                        ${d.name} (${d.assembler})
                        `;
            option.value = d._id;
            option.duck = d;
            duckSelect.append(option);
          }
        });

      duckSelect.addEventListener("change", function () {
        //console.log(this.value);
        activeDuck = duckSelect.options[duckSelect.selectedIndex];
        console.log(activeDuck.duck);
        loadDuck(activeDuck.duck);
      });

      function loadDuck(duck) {
        let stat_labels = [
          "strength",
          "focus",
          "health",
          "intelligence",
          "kindness",
        ];
        for (let stat of stat_labels) {
          let elem = document.getElementById(`${stat}_bar`);
          setStat(elem, duck.stats[stat]);
        }
      }
      function setStat(element, value) {
        element.querySelector(".progress-bar").style =
          `width:${value * STAT_MULTIPLIER}%`;
        element.querySelector(".stat_val_span").innerHTML = value;
      }
    </script>
  </body>
</html>
