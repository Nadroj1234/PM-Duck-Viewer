<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ECTS CMP Duck Viewer</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC"
      crossorigin="anonymous"
    />
    <style>
      #main_container {
        margin-top: 2em;
      }
    </style>
  </head>
  <body>
    <div class="container" id="main_container">
      <div class="mb-3">
        <label for="duckselect" class="form-label">please select a duck</label>
        <select
          id="duckselect"
          name="duckselect"
          class="form-select"
          aria-label="Default select example"
        >
          <option selected>Open this select menu</option>
        </select>
      </div>
      <div class="row">
        <div class="col-md-6"></div>
        <div class="col-md-6">
            <!--name, assembler, adjectives, bio, stats-->
            <div class="progress">
                <div class="progress-bar bg-success" role="progressbar" style="width: 25%" aria-valuenow="25" aria-valuemin="0" aria-valuemax="100"></div>
            </div>
            <div class="progress">
                <div class="progress-bar bg-info" role="progressbar" style="width: 50%" aria-valuenow="50" aria-valuemin="0" aria-valuemax="100"></div>
            </div>
            <div class="progress">
                <div class="progress-bar bg-warning" role="progressbar" style="width: 75%" aria-valuenow="75" aria-valuemin="0" aria-valuemax="100"></div>
            </div>
            <div class="progress">
                <div class="progress-bar bg-danger" role="progressbar" style="width: 100%" aria-valuenow="100" aria-valuemin="0" aria-valuemax="100"></div>
            </div>
        </div>
      </div>
    </div>
    <script>
      const duckSelect = document.getElementById("duckselect");
      fetch("https://api.ducks.ects-cmp.com/ducks")
        .then((resp) => resp.json())
        .then((data) => {
          for (d of data) {
            const option = document.createElement("option");
            option.innerHTML = `
                        ${d.name} (${d.assembler})
                        `;
            option.value = d._id;
            option.duck = d;
            duckSelect.append(option);
          }
        });
      duckSelect.addEventListener("change", function () {
        //console.log(this.value);
        activeDuck = duckSelect.options[duckSelect.selectedIndex];
        console.log(activeDuck.duck)
      });
    </script>
  </body>
</html>
