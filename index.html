<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ECTS CMP Ducks!</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC"
      crossorigin="anonymous"
    />
    <style>
      #main_container {
        margin-top: 4em;
      }
      .stat_text {
        width: 120px;
        font-weight: bold;
      }
      .progress {
        width: 300px;
      }
      .info-cell {
        width: calc(100% - 150px);
      }
      #duck_info_container > div {
        border-bottom: 1px solid black;
        padding: 1em auto;
      }
      #ThreeDuck {
        min-height: 400px;
        background-color: black;
        img,
        .placeholder {
          display: block;
        }
      }
      #ThreeDuck.waiting {
        position: relative;
        img {
          position: absolute;
          width: 20%;
          top: 40%;
          left: 40%;
        }
        img.microwave {
          width: 80%;
          top: 10%;
          left: 10%;
        }
        .placeholder {
          color: white;
          text-align: center;
          font-size: 2em;
        }
      }
    </style>
  </head>
  <body>
    <div class="container" id="main_container">
      <div class="mb-3">
        <label for="duckSelect" class="form-label">Please select a duck</label>
        <select
          id="duckSelect"
          name="duckSelect"
          class="form-select"
          aria-label="Default select example"
          placehoder="Select a duck"
        >
          <option selected disabled>Please Select a Duck</option></select
        >
      </div>
      <div class="row">
        <div class="col-md-6">
          <div id="ThreeDuck" class="waiting">
            <img
              class="loading_duck"
              src="./images/Loading_Duck 1.gif"
              id="loading_img"
              alt=""
            />
            <div class="placeholder"> Please select a duck to load </div>
          </div>
        </div>
        <div class="col-md-6" id="duck_info_container">
          <div id="name_row" class="d-flex align-items-center gap-2 flex-wrap">
            <div class="stat_text">Name</div>
            <div class="flex-grow-1 info-cell">
              <span class="stat_val_span"></span>
            </div>
          </div>

          <div
            id="assembler_row"
            class="d-flex align-items-center gap-2 flex-wrap"
          >
            <div class="stat_text">Assembler</div>
            <div class="flex-grow-1 info-cell">
              <span class="stat_val_span"></span>
            </div>
          </div>
          <div
            id="adjectives_row"
            class="d-flex align-items-center gap-2 flex-wrap"
          >
            <div class="stat_text">Adjectives</div>
            <div class="flex-grow-1 info-cell">
              <span class="stat_val_span"></span>
            </div>
          </div>
          <div id="bio_row" class="d-flex align-items-center gap-2 flex-wrap">
            <div class="stat_text">Bio</div>
            <div class="flex-grow-1 info-cell">
              <span class="stat_val_span"></span>
            </div>
          </div>

          <div
            id="strength_bar"
            class="d-flex align-items-center gap-2 flex-wrap"
          >
            <div class="stat_text">Strength</div>
            <div class="progress flex-grow-1">
              <div
                class="progress-bar bg-warning"
                role="progressbar"
                style="width: 0%"
              >
                <span class="stat_val_span"></span>
              </div>
            </div>
          </div>
          <div
            id="health_bar"
            class="d-flex align-items-center gap-2 flex-wrap"
          >
            <div class="stat_text">Health</div>
            <div class="progress flex-grow-1">
              <div
                class="progress-bar bg-primary"
                role="progressbar"
                style="width: 0%"
              >
                <span class="stat_val_span"></span>
              </div>
            </div>
          </div>
          <div
            id="intelligence_bar"
            class="d-flex align-items-center gap-2 flex-wrap"
          >
            <div class="stat_text">Intelligence</div>
            <div class="progress flex-grow-1">
              <div
                class="progress-bar bg-success"
                role="progressbar"
                style="width: 0%"
              >
                <span class="stat_val_span"></span>
              </div>
            </div>
          </div>

          <div id="focus_bar" class="d-flex align-items-center gap-2 flex-wrap">
            <div class="stat_text">Focus</div>
            <div class="progress flex-grow-1">
              <div
                class="progress-bar bg-danger"
                role="progressbar"
                style="width: 0%"
              >
                <span class="stat_val_span"></span>
              </div>
            </div>
          </div>
          <div
            id="kindness_bar"
            class="d-flex align-items-center gap-2 flex-wrap"
          >
            <div class="stat_text">Kindness</div>
            <div class="progress flex-grow-1">
              <div
                class="progress-bar bg-info"
                role="progressbar"
                style="width: 0%"
              >
                <span class="stat_val_span"></span>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
    <script type="importmap">
      {
        "imports": {
          "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
          "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
        }
      }
    </script>
    <script type="module" src="./js/duckViewer.js"></script>
    <script type="module">
      import { DuckViewer } from "./js/duckViewer.js";
      const viewer = new DuckViewer(document.getElementById("ThreeDuck"));
      const duckSelect = document.getElementById("duckSelect");
      const STAT_MULTIPLIER = 10;
      let activeDuck;
      fetch("https://api.ducks.ects-cmp.com/ducks")
        .then((resp) => resp.json())
        .then((data) => {
          for (let d of data) {
            const option = document.createElement("option");
            option.innerHTML = `
                        ${d.name} (${d.assembler})
                        `;
            option.value = d._id;
            option.duck = d;
            duckSelect.append(option);
          }
        });

      duckSelect.addEventListener("change", function () {
        //console.log(this.value);
        activeDuck = duckSelect.options[duckSelect.selectedIndex];
        console.log(activeDuck.duck);
        loadDuck(activeDuck.duck);
      });

      async function loadDuck(duck) {
        document.getElementById("ThreeDuck").classList.add("waiting");
        const duckImg = document.getElementById("loading_img");
        duckImg.src = "./images/Microwave_Duck.gif";
        duckImg.classList.add("microwave");
        let stat_labels = [
          "strength",
          "focus",
          "health",
          "intelligence",
          "kindness",
        ];
        let row_labels = ["name", "assembler", "adjectives", "bio"];
        for (let stat of stat_labels) {
          let elem = document.getElementById(`${stat}_bar`);
          displayStat(elem, duck.stats[stat]);
        }
        for (let row of row_labels) {
          let elem = document.getElementById(`${row}_row`);
          displayAttribute(elem, duck[row]);
        }

        await viewer.showDuck(duck);
        document.getElementById("ThreeDuck").classList.remove("waiting");
      }
      function displayAttribute(element, value) {
        element.querySelector(".stat_val_span").innerHTML = value;
      }
      function displayStat(element, value) {
        element.querySelector(".progress-bar").style =
          `width: ${value * STAT_MULTIPLIER}%`;
        element.querySelector(".stat_val_span").innerHTML = value;
      }
    </script>
  </body>
</html>
